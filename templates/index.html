<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Channel Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #ff0000;
      --red-dark: #cc0000;
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --surface3: #2e2e2e;
      --border: #2e2e2e;
      --text: #f1f1f1;
      --text-muted: #999;
      --link: #3ea6ff;
      --sidebar-w: 300px;
      --green: #2ecc71;
    }

    html, body { height: 100%; font-family: "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* ─── Layout ─────────────────────────────────────────── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ─── Sidebar ─────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-header h2 { font-size: 15px; font-weight: 600; }
    .history-list { overflow-y: auto; flex: 1; padding: 8px 0; }
    .history-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 32px 16px; }
    .history-item {
      padding: 10px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .history-item:hover { background: var(--surface2); }
    .history-item.active { background: var(--surface2); border-left-color: var(--red); }
    .hi-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hi-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; gap: 8px; align-items: center; }
    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
    }
    .history-item.active .badge { border-color: #444; }

    /* ─── Main ──────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ─── Top bar ──────────────────────────────────────────── */
    .topbar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .logo span { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    .logo .yt-dot { color: var(--red); }

    .search-bar { display: flex; flex: 1; gap: 8px; align-items: center; }

    .search-bar input[type="text"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .search-bar input[type="text"]:focus { border-color: #555; }
    .search-bar input[type="text"]::placeholder { color: var(--text-muted); }

    .search-bar input[type="number"] {
      width: 104px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      appearance: textfield;
    }
    .search-bar input[type="number"]:focus { border-color: #555; }
    .search-bar input[type="number"]::placeholder { color: var(--text-muted); }

    /* View selector */
    .view-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .15s;
    }
    .view-select:focus { border-color: #555; }

    .btn-search {
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-search:hover { background: var(--red-dark); }
    .btn-search:disabled { opacity: .5; cursor: not-allowed; }

    /* ─── Content area ─────────────────────────────────────── */
    .content { flex: 1; overflow-y: auto; padding: 24px; }

    /* ─── States ────────────────────────────────────────────── */
    .state-idle, .state-loading, .state-error, .state-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
    }
    .state-idle svg { opacity: .25; }
    .state-idle p, .state-empty p { font-size: 15px; }
    .state-empty { color: var(--text-muted); }
    .state-empty svg { opacity: .3; }
    .state-empty .empty-hint { font-size: 12px; margin-top: -4px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-error { color: #ff6b6b; }
    .state-error .err-msg { font-size: 14px; max-width: 420px; }

    /* ─── Results header ─────────────────────────────────────── */
    .results-header { margin-bottom: 20px; }
    .results-header h1 { font-size: 20px; font-weight: 700; }
    .rh-meta {
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 13px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .rh-meta a { color: var(--link); text-decoration: none; }
    .rh-meta a:hover { text-decoration: underline; }

    /* ─── List view ──────────────────────────────────────────── */
    .month-group { margin-bottom: 28px; }
    .month-heading {
      font-size: 15px;
      font-weight: 600;
      padding: 8px 0 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .month-count { font-size: 12px; font-weight: 400; color: var(--text-muted); }
    .video-list { display: flex; flex-direction: column; gap: 4px; }
    .video-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      transition: background .12s;
    }
    .video-item:hover { background: var(--surface2); }
    .video-num { font-size: 11px; color: var(--text-muted); min-width: 22px; padding-top: 2px; text-align: right; }
    .video-info { flex: 1; }
    .video-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
    .video-link { font-size: 12px; color: var(--link); text-decoration: none; display: inline-block; margin-top: 2px; }
    .video-link:hover { text-decoration: underline; }
    .video-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; padding-top: 3px; }

    /* ─── Summary table ──────────────────────────────────────── */
    .summary-wrap { overflow-x: auto; }

    .summary-table {
      border-collapse: collapse;
      width: 100%;
      min-width: 700px;
      font-size: 13px;
    }
    .summary-table th, .summary-table td {
      padding: 9px 12px;
      text-align: right;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .summary-table th {
      background: var(--surface2);
      font-weight: 600;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .summary-table th:first-child, .summary-table td:first-child {
      text-align: left;
      font-weight: 600;
    }
    .summary-table tbody tr:hover td { background: var(--surface2); }
    .summary-table tbody tr td { color: var(--text); }

    /* highlight non-zero cells */
    .summary-table td.has-videos { color: #fff; font-weight: 500; }
    .summary-table td.top-month { background: rgba(255,0,0,.12); color: var(--red) !important; font-weight: 700; }

    /* totals row */
    .summary-table tfoot td {
      background: var(--surface2);
      font-weight: 700;
      border-top: 2px solid var(--border);
      color: var(--text);
    }
    .summary-table .total-col {
      background: var(--surface3) !important;
      font-weight: 700;
      border-left: 2px solid var(--border);
    }
    .summary-table tfoot .total-col { color: var(--red); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <h2>Session History</h2>
    </div>
    <div class="history-list" id="history-list">
      <p class="history-empty">No searches yet</p>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────── -->
  <div class="main">
    <div class="topbar">
      <div class="logo">
        <svg width="28" height="20" viewBox="0 0 28 20" fill="none">
          <rect width="28" height="20" rx="4" fill="#FF0000"/>
          <polygon points="11,5 11,15 20,10" fill="white"/>
        </svg>
        <span>Channel<span class="yt-dot">.</span>Explorer</span>
      </div>
      <form class="search-bar" id="search-form" autocomplete="off">
        <input type="text" id="channel-input" placeholder="@handle, channel name, or YouTube URL" />
        <input type="number" id="year-input" placeholder="Year (opt.)" min="2005" max="2030" />
        <select class="view-select" id="view-select">
          <option value="list">List view</option>
          <option value="summary">Summary table</option>
        </select>
        <button class="btn-search" type="submit" id="search-btn">Search</button>
      </form>
    </div>

    <div class="content" id="content">
      <div class="state-idle">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>Enter a YouTube channel to see its video timeline</p>
      </div>
    </div>
  </div>

</div>

<script>
  const form       = document.getElementById('search-form');
  const channelIn  = document.getElementById('channel-input');
  const yearIn     = document.getElementById('year-input');
  const viewSelect = document.getElementById('view-select');
  const searchBtn  = document.getElementById('search-btn');
  const content    = document.getElementById('content');
  const historyEl  = document.getElementById('history-list');

  let currentResult   = null;
  let activeHistoryId = null;

  // ── Search ──────────────────────────────────────────────
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const channel = channelIn.value.trim();
    if (!channel) return;
    setLoading(true);
    activeHistoryId = null;
    try {
      const res  = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ channel, year: yearIn.value || null }),
      });
      const data = await res.json();
      if (!res.ok || data.error) { showError(data.error || 'Unknown error'); return; }
      activeHistoryId = data.history_id;
      renderResults(data.result);
      await refreshHistory();
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading(false);
    }
  });

  // ── View toggle ─────────────────────────────────────────
  viewSelect.addEventListener('change', () => {
    if (currentResult) renderResults(currentResult);
  });

  // ── Render dispatcher ───────────────────────────────────
  function renderResults(r) {
    currentResult = r;
    if (viewSelect.value === 'summary') {
      renderSummaryTable(r);
    } else {
      renderListView(r);
    }
  }

  // ── List view ───────────────────────────────────────────
  function renderListView(r) {
    const yearLabel  = r.year_filter ? ` · ${r.year_filter}` : '';
    const channelUrl = `https://www.youtube.com/channel/${r.channel_id}`;

    let html = `
      <div class="results-header">
        <h1>${esc(r.channel_title)}</h1>
        <div class="rh-meta">
          <span>${r.total.toLocaleString()} video${r.total !== 1 ? 's' : ''}${yearLabel}</span>
          <a href="${channelUrl}" target="_blank" rel="noopener">Open channel ↗</a>
        </div>
      </div>
    `;

    if (r.total === 0) {
      const hint = r.year_filter
        ? `No videos were uploaded in ${r.year_filter}.`
        : 'This channel has no public videos.';
      html += `
        <div class="state-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <p>${hint}</p>
          ${r.year_filter ? '<span class="empty-hint">Try removing the year filter to see all videos.</span>' : ''}
        </div>
      `;
      content.innerHTML = html;
      return;
    }

    for (const group of r.groups) {
      html += `
        <div class="month-group">
          <div class="month-heading">
            ${esc(group.label)}
            <span class="month-count">${group.videos.length} video${group.videos.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="video-list">
      `;
      group.videos.forEach((v, i) => {
        html += `
          <div class="video-item">
            <span class="video-num">${i + 1}</span>
            <div class="video-info">
              <div class="video-title">${esc(v.title)}</div>
              <a class="video-link" href="${esc(v.url)}" target="_blank" rel="noopener">${esc(v.url)}</a>
            </div>
            <span class="video-date">${fmtDate(v.published_at)}</span>
          </div>
        `;
      });
      html += `</div></div>`;
    }

    content.innerHTML = html;
    content.scrollTop = 0;
  }

  // ── Summary table view ──────────────────────────────────
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function renderSummaryTable(r) {
    const yearLabel  = r.year_filter ? ` · ${r.year_filter}` : '';
    const channelUrl = `https://www.youtube.com/channel/${r.channel_id}`;

    let html = `
      <div class="results-header">
        <h1>${esc(r.channel_title)}</h1>
        <div class="rh-meta">
          <span>${r.total.toLocaleString()} video${r.total !== 1 ? 's' : ''}${yearLabel}</span>
          <a href="${channelUrl}" target="_blank" rel="noopener">Open channel ↗</a>
        </div>
      </div>
    `;

    if (r.total === 0) {
      const hint = r.year_filter
        ? `No videos were uploaded in ${r.year_filter}.`
        : 'This channel has no public videos.';
      html += `
        <div class="state-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <p>${hint}</p>
          ${r.year_filter ? '<span class="empty-hint">Try removing the year filter to see all videos.</span>' : ''}
        </div>
      `;
      content.innerHTML = html;
      return;
    }

    // Build year → month[1..12] count matrix
    const matrix = {};
    const years  = new Set();
    for (const g of r.groups) {
      years.add(g.year);
      if (!matrix[g.year]) matrix[g.year] = {};
      matrix[g.year][g.month] = g.videos.length;
    }
    const sortedYears = [...years].sort((a, b) => b - a);

    // Column totals (sum across all years per month)
    const monthTotals = Array.from({length: 12}, (_, i) =>
      sortedYears.reduce((s, y) => s + (matrix[y]?.[i + 1] || 0), 0)
    );
    const grandTotal = monthTotals.reduce((a, b) => a + b, 0);

    // Find highest month total to highlight it
    const maxMonth = Math.max(...monthTotals);

    html += `<div class="summary-wrap"><table class="summary-table">
      <thead>
        <tr>
          <th>Year</th>
          ${MONTH_NAMES.map(m => `<th>${m}</th>`).join('')}
          <th class="total-col">Total</th>
        </tr>
      </thead>
      <tbody>
    `;

    for (const y of sortedYears) {
      const rowTotal = sortedYears.length > 0
        ? Object.values(matrix[y] || {}).reduce((a, b) => a + b, 0)
        : 0;
      html += `<tr><td>${y}</td>`;
      for (let m = 1; m <= 12; m++) {
        const count = matrix[y]?.[m] || 0;
        const cls   = count === 0 ? '' : (monthTotals[m - 1] === maxMonth && maxMonth > 0 ? ' class="has-videos top-month"' : ' class="has-videos"');
        html += `<td${cls}>${count || '–'}</td>`;
      }
      html += `<td class="total-col">${rowTotal}</td></tr>`;
    }

    html += `</tbody><tfoot><tr><td>Total</td>`;
    for (let m = 0; m < 12; m++) {
      const cls = monthTotals[m] === maxMonth && maxMonth > 0 ? ' class="top-month total-col"' : '';
      html += `<td${cls}>${monthTotals[m] || '–'}</td>`;
    }
    html += `<td class="total-col">${grandTotal}</td></tr></tfoot></table></div>`;

    content.innerHTML = html;
    content.scrollTop = 0;
  }

  // ── History ─────────────────────────────────────────────
  async function refreshHistory() {
    const res  = await fetch('/api/history');
    const list = await res.json();

    if (!list.length) {
      historyEl.innerHTML = '<p class="history-empty">No searches yet</p>';
      return;
    }

    historyEl.innerHTML = list.slice().reverse().map(h => {
      const yearTag = h.year_filter ? ` · ${h.year_filter}` : '';
      const active  = h.id === activeHistoryId ? ' active' : '';
      return `
        <div class="history-item${active}" data-id="${h.id}">
          <div class="hi-title">${esc(h.channel_title)}</div>
          <div class="hi-meta">
            <span>${h.timestamp}</span>
            <span class="badge">${h.total} videos${yearTag}</span>
          </div>
        </div>
      `;
    }).join('');

    historyEl.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => loadHistory(parseInt(el.dataset.id)));
    });
  }

  async function loadHistory(id) {
    setLoading(true);
    activeHistoryId = id;
    try {
      const res  = await fetch(`/api/history/${id}`);
      const data = await res.json();
      if (data.error) { showError(data.error); return; }
      renderResults(data);
      await refreshHistory();
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading(false);
    }
  }

  // ── Helpers ─────────────────────────────────────────────
  function setLoading(on) {
    searchBtn.disabled = on;
    if (on) {
      content.innerHTML = `<div class="state-loading"><div class="spinner"></div><p>Fetching videos…</p></div>`;
    }
  }

  function showError(msg) {
    content.innerHTML = `
      <div class="state-error">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p class="err-msg">${esc(msg)}</p>
      </div>
    `;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    } catch { return ''; }
  }
</script>
</body>
</html>
