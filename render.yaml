services:
  - type: web
    name: getgrowline
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
